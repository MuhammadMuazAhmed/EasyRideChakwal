
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif}
:root{--y:#F5C400;--yd:#D4A900;--b:#111111;--bg:#F8F8F8;--card:#fff;--border:#e5e5e5;--txt:#111;--txt2:#555;--txt3:#888;--radius:16px;--radius-sm:10px;--green:#16a34a;--red:#dc2626;--orange:#ea580c}
.wrap{background:var(--bg);min-height:600px;padding:16px}
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--y);padding-bottom:12px}
.nav-group{display:flex;flex-direction:column;gap:4px;min-width:0}
.nav-label{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;padding-left:4px}
.nav-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);transition:.15s;white-space:nowrap}
.pill:hover{border-color:var(--y);color:var(--b)}
.pill.active{background:var(--y);border-color:var(--yd);color:var(--b)}
.screens{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.phone{width:280px;min-width:280px;background:#111;border-radius:36px;padding:4px;box-shadow:0 4px 24px rgba(0,0,0,.18)}
.phone-inner{background:#fff;border-radius:32px;overflow:hidden;min-height:560px;position:relative}
.phone-bar{background:#111;height:32px;display:flex;align-items:center;justify-content:center;border-radius:28px 28px 0 0;position:relative}
.phone-bar::after{content:'';width:80px;height:6px;background:#333;border-radius:3px}
.phone-notch{width:100px;height:24px;background:#111;border-radius:0 0 16px 16px;position:absolute;top:0;left:50%;transform:translateX(-50%)}
.screen-desc{flex:1;min-width:220px;max-width:340px}
.screen-desc h3{font-size:15px;font-weight:700;color:var(--b);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.screen-desc p{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:8px}
.feature-tag{display:inline-block;background:#fff5cc;color:#7a5800;border:1px solid #f5c400;border-radius:6px;font-size:11px;font-weight:600;padding:2px 8px;margin:2px}

.s{display:flex;flex-direction:column;height:560px;font-family:'Segoe UI',sans-serif;overflow:hidden}
.topbar{background:#111;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;flex-shrink:0}
.topbar-title{font-weight:700;font-size:13px;letter-spacing:.3px}
.logo-mark{background:var(--y);color:#111;font-weight:900;font-size:11px;padding:3px 7px;border-radius:6px;margin-right:6px}
.body{flex:1;overflow:hidden;background:#f5f5f5;position:relative}
.bottombar{background:#fff;border-top:1px solid var(--border);padding:6px 0;display:flex;justify-content:space-around;flex-shrink:0}
.bb-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--txt3);padding:4px 8px;cursor:pointer;border-radius:8px}
.bb-item.act{color:#111}
.bb-item svg{width:18px;height:18px;stroke-width:2}
.bb-dot{width:4px;height:4px;background:var(--y);border-radius:50%;margin-top:1px}

.map-bg{background:linear-gradient(135deg,#e8f4d0 0%,#d4edb8 25%,#c5e8a0 50%,#d4edb8 75%,#e0f0c8 100%);flex:1;position:relative;overflow:hidden}
.map-road-h{position:absolute;background:#e0e0e0;height:12px;left:0;right:0}
.map-road-v{position:absolute;background:#e0e0e0;width:12px;top:0;bottom:0}
.car-pin{position:absolute;width:32px;height:32px;background:#111;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%)}
.you-pin{position:absolute;width:20px;height:20px;background:var(--y);border:3px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 6px rgba(245,196,0,.2)}
.map-card{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:12px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.search-bar{background:#f8f8f8;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--txt);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.search-bar input{border:none;background:transparent;font-size:13px;flex:1;outline:none;color:var(--txt)}
.ride-type{display:flex;gap:8px;margin-bottom:10px}
.rt{flex:1;background:#f5f5f5;border-radius:10px;padding:8px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent}
.rt.sel{background:#fff5cc;border-color:var(--y);color:#7a5800}
.rt svg{display:block;margin:0 auto 3px}
.btn-primary{background:#111;color:var(--y);border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;width:100%;cursor:pointer;letter-spacing:.3px}
.btn-yellow{background:var(--y);color:#111;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;width:100%;cursor:pointer;letter-spacing:.3px}
.row{display:flex;align-items:center;gap:8px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#111;flex-shrink:0}
.badge{background:#111;color:var(--y);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-green{background:#dcfce7;color:#15803d;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-yellow{background:#fff5cc;color:#7a5800;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-red{background:#fee2e2;color:#dc2626;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge-gray{background:#f1f1f1;color:#555;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.divider{height:1px;background:var(--border);margin:8px 0}
.card{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);margin-bottom:8px}
.mini-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.val{font-size:15px;font-weight:700;color:var(--txt)}
.val-sm{font-size:13px;font-weight:600;color:var(--txt)}
.muted{font-size:12px;color:var(--txt2)}
.muted-sm{font-size:11px;color:var(--txt3)}
.scr{flex:1;overflow-y:auto;padding:12px}
.scr::-webkit-scrollbar{width:0}
.input-field{background:#f8f8f8;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--txt);width:100%;outline:none;font-family:inherit}
.input-field:focus{border-color:var(--y);background:#fffdf0}
.input-label{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.3px}
.upload-box{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;font-size:12px;color:var(--txt3);background:#fafafa;display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:8px}
.upload-box svg{opacity:.4}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-card{background:#fff;border-radius:10px;padding:10px;border:1px solid var(--border);text-align:center}
.stat-big{font-size:20px;font-weight:800;color:var(--b)}
.stat-lbl{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase}
.online-btn{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;width:100%;cursor:pointer}
.offline-btn{background:#f1f1f1;color:var(--txt2);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;width:100%;cursor:pointer}
.ride-req{background:#fff;border:2px solid var(--y);border-radius:14px;padding:12px;margin-bottom:8px}
.timer-ring{width:48px;height:48px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;color:var(--y);font-weight:800;font-size:16px;flex-shrink:0}
.dot-green{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
.dot-yellow{width:8px;height:8px;background:var(--y);border-radius:50%;flex-shrink:0}
.dot-gray{width:8px;height:8px;background:#ccc;border-radius:50%;flex-shrink:0}
.progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:var(--y);border-radius:3px}
.admin-sidebar{width:64px;background:#111;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px}
.admin-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#f5f5f5}
.admin-header{background:#fff;padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-content{flex:1;overflow-y:auto;padding:10px}
.admin-content::-webkit-scrollbar{width:0}
.sb-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.sb-icon:hover,.sb-icon.act{background:rgba(245,196,0,.2)}
.sb-icon.act svg{stroke:var(--y)}
.sb-icon svg{stroke:#888;stroke-width:1.8;width:20px;height:20px;fill:none}
.sb-logo{background:var(--y);width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#111;margin-bottom:8px}
.tbl-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:8px;margin-bottom:4px;border:1px solid var(--border);font-size:12px}
.tbl-header{display:flex;align-items:center;gap:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.col-1{flex:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.col-2{flex:1;text-align:center}
.col-3{flex:.8;text-align:right}
.stars{color:var(--y);font-size:11px;letter-spacing:-1px}
.verify-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.step-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-done{background:#dcfce7}
.step-pend{background:#fff5cc}
.step-wait{background:#f1f1f1}
</style>

<div class="wrap">

<div class="nav">
  <div class="nav-group">
    <div class="nav-label">🧍 Rider</div>
    <div class="nav-pills">
      <div class="pill active" onclick="show('r-home')">Home</div>
      <div class="pill" onclick="show('r-search')">Search</div>
      <div class="pill" onclick="show('r-tracking')">Tracking</div>
      <div class="pill" onclick="show('r-trip')">Trip Active</div>
      <div class="pill" onclick="show('r-history')">History</div>
      <div class="pill" onclick="show('r-profile')">Profile</div>
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">🚗 Driver</div>
    <div class="nav-pills">
      <div class="pill" onclick="show('d-home')">Dashboard</div>
      <div class="pill" onclick="show('d-request')">Ride Request</div>
      <div class="pill" onclick="show('d-nav')">Navigation</div>
      <div class="pill" onclick="show('d-earnings')">Earnings</div>
      <div class="pill" onclick="show('d-profile')">Profile</div>
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">✅ Verification</div>
    <div class="nav-pills">
      <div class="pill" onclick="show('v-onboard')">Signup</div>
      <div class="pill" onclick="show('v-docs')">Upload Docs</div>
      <div class="pill" onclick="show('v-status')">Status</div>
    </div>
  </div>
  <div class="nav-group">
    <div class="nav-label">⚙️ Admin</div>
    <div class="nav-pills">
      <div class="pill" onclick="show('a-dash')">Dashboard</div>
      <div class="pill" onclick="show('a-drivers')">Drivers</div>
      <div class="pill" onclick="show('a-rides')">Live Rides</div>
      <div class="pill" onclick="show('a-verify')">Verify Driver</div>
    </div>
  </div>
</div>

<div class="screens">
  <div class="phone">
    <div class="phone-bar"><div class="phone-notch"></div></div>
    <div class="phone-inner" id="phone-content"></div>
  </div>
  <div class="screen-desc" id="screen-desc"></div>
</div>

</div>

<script>
const screens = {

'r-home': {
  label:'Rider — Home Map',
  icon:'🗺️',
  desc:'Main screen when rider opens the app. GPS auto-detects location on Chakwal map. Pin-drop model — rider taps map to set pickup point. Vehicle types (Car, Bike, Qingqi) shown for selection.',
  features:['Auto GPS location detect','Pin-drop pickup','3 vehicle types','WhatsApp support link'],
  html:`<div class="s">
    <div class="topbar">
      <div class="row" style="gap:6px"><span class="logo-mark">E</span><span class="topbar-title">Easy Ride Chakwal</span></div>
      <div class="row" style="gap:6px"><div class="dot-green"></div><span style="font-size:11px;color:#aaa">Chakwal</span></div>
    </div>
    <div style="flex:1;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:#e8f0d8">
        <div style="position:absolute;top:45%;left:0;right:0;height:14px;background:#e0dcd0;opacity:.9"></div>
        <div style="position:absolute;top:20%;left:0;right:0;height:10px;background:#e0dcd0;opacity:.7"></div>
        <div style="position:absolute;left:35%;top:0;bottom:0;width:12px;background:#e0dcd0;opacity:.9"></div>
        <div style="position:absolute;left:65%;top:0;bottom:0;width:10px;background:#e0dcd0;opacity:.7"></div>
        <div style="position:absolute;top:30%;left:10%;font-size:9px;color:#888;font-weight:600">Clock Tower Rd</div>
        <div style="position:absolute;top:55%;left:40%;font-size:9px;color:#888;font-weight:600">GT Road</div>
        <div class="you-pin" style="top:48%;left:40%"></div>
        <div style="position:absolute;top:26%;left:55%;transform:translate(-50%,-50%)">
          <div style="background:#111;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5C400" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          </div>
        </div>
        <div style="position:absolute;top:70%;left:20%;transform:translate(-50%,-50%)">
          <div style="background:#111;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5C400" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          </div>
        </div>
        <div style="position:absolute;top:40%;left:0;right:0;display:flex;justify-content:center">
          <div style="background:rgba(0,0,0,.75);color:#F5C400;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px">📍 Tap map to set pickup</div>
        </div>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:12px;box-shadow:0 -4px 20px rgba(0,0,0,.1)">
        <div class="search-bar" style="margin-bottom:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <span style="font-size:13px;color:#999">Kahan jaana hai? (Where to go?)</span>
        </div>
        <div class="ride-type">
          <div class="rt sel">
            <svg width="22" height="14" viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="32" height="12" rx="3"/><circle cx="10" cy="20" r="3"/><circle cx="30" cy="20" r="3"/><path d="M8 8l4-6h12l4 6"/></svg>
            <div>Car</div>
          </div>
          <div class="rt">
            <svg width="18" height="14" viewBox="0 0 32 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="8" cy="19" rx="4" ry="4"/><ellipse cx="24" cy="19" rx="4" ry="4"/><path d="M8 15V8l8-6 8 6v7"/><path d="M16 2v13"/></svg>
            <div>Bike</div>
          </div>
          <div class="rt">
            <svg width="20" height="14" viewBox="0 0 36 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="8" width="20" height="12" rx="3"/><path d="M22 12h8l2 6H22"/><circle cx="8" cy="22" r="2"/><circle cx="27" cy="22" r="2"/></svg>
            <div>Qingqi</div>
          </div>
        </div>
        <button class="btn-primary">Request Ride</button>
      </div>
    </div>
    <div class="bottombar">
      <div class="bb-item act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span><div class="bb-dot"></div></div>
      <div class="bb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>History</span></div>
      <div class="bb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></div>
    </div>
  </div>`
},

'r-search': {
  label:'Rider — Set Destination',
  icon:'🔍',
  desc:'Rider types destination. Landmark-based suggestions populate from Chakwal known places — Bus Stand, GCT College, Clock Tower, Tehsil Office. Recent & saved places shown below.',
  features:['Landmark autocomplete','Recent places','Pin on map option','Urdu/English places'],
  html:`<div class="s">
    <div class="topbar">
      <div class="row" style="gap:8px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        <span class="topbar-title">Set Destination</span>
      </div>
    </div>
    <div class="scr" style="background:#fff;padding:12px">
      <div style="background:#fffdf0;border:2px solid var(--y);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div class="dot-green" style="flex-shrink:0"></div>
        <span style="font-size:13px;color:#555">Clock Tower Chakwal (Current)</span>
      </div>
      <div style="background:#f8f8f8;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5C400" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="input-field" style="background:transparent;border:none;padding:0;font-size:13px" placeholder="Kahan jaana hai?" />
      </div>
      <div class="muted-sm" style="margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Popular Spots</div>
      ${['GCT Chakwal College 🎓','Chakwal Bus Stand 🚌','Tehsil Office چکوال','Chakwal City Hospital 🏥','GT Road Petrol Pump ⛽','Kallar Kahar Road'].map(p=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #f5f5f5;cursor:pointer">
        <div style="width:30px;height:30px;background:#f8f8f8;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F5C400" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#111">${p.split(' ')[0]+' '+p.split(' ')[1]}</div><div class="muted-sm">${p.split(' ').slice(2).join(' ')||'Chakwal, Punjab'}</div></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>`).join('')}
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;padding:10px;background:#f8f8f8;border-radius:10px;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5C400" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
        <span style="font-size:13px;font-weight:600">Pin location on map</span>
      </div>
    </div>
  </div>`
},

'r-tracking': {
  label:'Rider — Driver En Route',
  icon:'📍',
  desc:'After driver accepts, rider sees driver moving in real-time toward pickup. Driver name, photo, vehicle info, rating, and ETA shown. One-tap call and SOS button visible.',
  features:['Real-time driver dot','ETA countdown','Driver rating + vehicle','SOS emergency button'],
  html:`<div class="s">
    <div class="topbar">
      <div class="row" style="gap:6px"><span class="logo-mark">E</span><span class="topbar-title">Driver Coming...</span></div>
      <div class="badge-green">ETA 4 min</div>
    </div>

function show(id) {
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  const s = screens[id];
  document.getElementById('phone-content').innerHTML = s.html;
  document.getElementById('screen-desc').innerHTML = `
    <h3>${s.icon} ${s.label}</h3>
    <p>${s.desc}</p>
    <div>${s.features.map(f=>`<span class="feature-tag">${f}</span>`).join('')}</div>
  `;
}
